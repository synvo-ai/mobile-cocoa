<!DOCTYPE html>
<html>
<head>
    <title>Mobile Cocoa QR Code</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
        }
        img {
            display: block;
            margin: 0 auto 1rem;
            border: 1px solid #eee;
        }
        p {
            color: #666;
            margin: 0;
            font-size: 0.9rem;
        }
        code {
            display: block;
            background: #f4f4f5;
            padding: 0.5rem;
            border-radius: 0.25rem;
            margin-top: 0.5rem;
            word-break: break-all;
            font-size: 0.8rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://strength-valley-semiconductor-guests.trycloudflare.com" alt="QR Code" width="300" height="300">
        <p>Scan with Expo Go app:</p>
        <code>https://strength-valley-semiconductor-guests.trycloudflare.com</code>
    </div>
</body>
</html>
